name: Refresh Forum Cinemas

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: schedule-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: website
      - uses: actions/checkout@v7
        with:
          ref: data
          path: data
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: website
      - run: pnpm test
        working-directory: website
      - name: Refresh and push normalized data
        run: |
          set -euo pipefail
          git -C data config user.name 'github-actions[bot]'
          git -C data config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3; do
            # ESP ingestion can update this branch at the same time. Rebuild
            # from its latest snapshot so neither source's data is discarded.
            git -C data fetch origin data
            git -C data reset --hard origin/data
            node website/scripts/scrape.mjs --forum-only --days 2 \
              --previous data/site/data/schedule.json \
              --output data/site/data/schedule.json
            git -C data add site/data/schedule.json
            if git -C data diff --cached --quiet; then
              echo 'Forum data is already current.'
              exit 0
            fi
            git -C data commit -m 'Refresh Forum Cinemas schedule'
            if git -C data push origin HEAD:data; then
              exit 0
            fi
            echo "Data branch changed during attempt $attempt; retrying."
            sleep "$((attempt * 2))"
          done
          echo 'Could not push Forum data after three attempts.' >&2
          exit 1
      - run: cp data/site/data/schedule.json website/site/data/schedule.json
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
