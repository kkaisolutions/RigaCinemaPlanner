name: Refresh Forum Cinemas

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: schedule-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: website
      - uses: actions/checkout@v7
        with:
          ref: data
          path: data
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: website
      - run: pnpm test
        working-directory: website
      - run: >-
          node scripts/scrape.mjs --forum-only
          --previous ../data/site/data/schedule.json
          --output ../data/site/data/schedule.json
        working-directory: website
      - name: Commit latest normalized data
        working-directory: data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/data/schedule.json
          git diff --cached --quiet || git commit -m 'Refresh Forum Cinemas schedule'
          git push
      - run: cp data/site/data/schedule.json website/site/data/schedule.json
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
