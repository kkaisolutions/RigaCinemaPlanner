<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Today’s movie showtimes across Riga cinemas.">
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <header class="page-header">
      <div class="header-inner">
        <div>
          <h1><span aria-hidden="true">🍿</span> Riga Cinema Planner</h1>
        </div>
        <div class="header-actions">
          <div class="status" id="status">Loading showtimes...</div>
          <div id="source-info" class="source-info" hidden>
            <button type="button" class="source-info-button" aria-label="Show source update details" aria-describedby="source-tooltip">i</button>
            <div id="source-tooltip" class="source-tooltip" role="tooltip"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="app">
      <section class="controls" aria-label="Filters">
        <label class="search">
          <span>Movie</span>
          <span class="search-field">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m21 21-4.35-4.35m2.35-5.15a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"/></svg>
            <input id="movie-search" type="search" autocomplete="off" placeholder="Search local or original title">
          </span>
        </label>
        <div class="cinema-filter">
          <span class="filter-label">Cinema</span>
          <details class="cinema-menu">
            <summary>
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M3 21h18M5 21V8l7-4 7 4v13M9 21v-6h6v6M8 10h.01M16 10h.01"/></svg>
              <span id="cinema-summary">Loading cinemas…</span>
              <svg class="chevron" aria-hidden="true" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
            </summary>
            <div id="cinema-options" class="cinema-options"></div>
          </details>
        </div>
      </section>

      <nav id="date-tabs" class="date-tabs" aria-label="Schedule date"></nav>

      <section class="results-head" aria-live="polite">
        <h2 id="result-count">Upcoming sessions</h2>
        <p id="warning-note" class="warning-note" hidden></p>
      </section>

      <section id="showtime-list" class="showtime-list" aria-label="Showtimes"></section>
      <section id="empty-state" class="empty-state" hidden>
        <h2 id="empty-title">No upcoming sessions today</h2>
        <p>Check again later. The schedule updates hourly during the day and evening.</p>
      </section>
    </main>

    <script src="./assets/app.js" type="module"></script>
  </body>
</html>
